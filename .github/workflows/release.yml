name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
            archive: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            ext: ""
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip debug symbols (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          strip target/${{ matrix.target }}/release/ollama-bench${{ matrix.ext }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../ollama-bench-${{ github.ref_name }}-${{ matrix.target }}.tar.gz \
            ollama-bench${{ matrix.ext }}

      - name: Package (zip)
        if: matrix.archive == 'zip'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../ollama-bench-${{ github.ref_name }}-${{ matrix.target }}.zip \
            ollama-bench${{ matrix.ext }}

      - name: Compute checksums
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          sha256sum ollama-bench${{ matrix.ext }} > ollama-bench${{ matrix.ext }}.sha256
          cp ollama-bench${{ matrix.ext }}.sha256 ../../../ollama-bench-${{ github.ref_name }}-${{ matrix.target }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ollama-bench-${{ matrix.target }}
          path: |
            ollama-bench-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            ollama-bench-${{ github.ref_name }}-${{ matrix.target }}.zip
            ollama-bench-${{ github.ref_name }}-${{ matrix.target }}.sha256
          if-no-files-found: warn

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List artifacts
        run: ls -lh

      - name: Generate release body
        id: body
        run: |
          VERSION="${{ github.ref_name }}"
          cat <<'EOF' > release_body.md
          ## ollama-bench ${VERSION#v}

          See [CHANGELOG](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}) or the [README](https://github.com/${{ github.repository }}#readme) for usage instructions.

          ### Downloads

          | Platform        | Archive |
          | --------------- | ------- |
          | Linux (x86_64)  | \`ollama-bench-${VERSION}-x86_64-unknown-linux-gnu.tar.gz\` |
          | macOS (Intel)   | \`ollama-bench-${VERSION}-x86_64-apple-darwin.tar.gz\` |
          | macOS (Apple)   | \`ollama-bench-${VERSION}-aarch64-apple-darwin.tar.gz\` |
          | Windows (x86_64)| \`ollama-bench-${VERSION}-x86_64-pc-windows-msvc.zip\` |
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ollama-bench ${{ github.ref_name }}
          body_path: release_body.md
          files: |
            *.tar.gz
            *.zip
            *.sha256
          generate_release_notes: true
